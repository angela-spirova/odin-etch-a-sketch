<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-sketch</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="controls">
        <div>
            <h2>Grid size</h2>
            <input id="grid-size-slider" name="grid-size-slider" type="range" min="1" max="100" value="16">
            <p><span class="slider-value">16</span>x<span class="slider-value">16</span></p>
            <button id="grid-size-button">Apply</button>
        </div>
        <div>
            <h2>Color</h2>
            <div>
                <label for="custom-color">Custom</label>
                <input id="custom-color" name="custom-color" type="color">
            </div>

        </div>
        
    </div>
    <div id="container"></div>
</body>
</html>
