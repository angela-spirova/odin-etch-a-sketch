<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-sketch</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Etch-a-sketch</h1>
    <div>
        
        <div id="controls">
            
            <section>
                <h2>Grid size</h2> 
                <span>(<span class="slider-value">16</span>x<span class="slider-value">16</span>)</span>
                <input id="grid-size-slider" name="grid-size-slider" type="range" min="2" max="100" value="16">
            </section>
            <section>
                <h2>Color</h2>
                <label for="custom-color">Custom:</label>
                <input id="custom-color" name="custom-color" type="color">
                <button id="random-color">Randomize</button>
            </section>
            <section>
                <h2>Other</h2>
                <button id="grid-lines-button">Toggle grid lines</button>
            </section>
            
        </div>
        
        <div id="container"></div>
    </div>
    
    
</body>
</html>
